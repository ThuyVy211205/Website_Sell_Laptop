<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Liên hệ Zalo - Horse Store</title>
	<link rel="stylesheet" href="../css/style.css">
	<style>
		body, html {
			height: 100%;
			margin: 0;
			padding: 0;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4be1ba 75%, #38f9d7 100%);
			background-size: 400% 400%;
			animation: gradientShift 15s ease infinite;
		}

		@keyframes gradientShift {
			0% { background-position: 0% 50%; }
			50% { background-position: 100% 50%; }
			100% { background-position: 0% 50%; }
		}

		.zalo-bg {
			position: fixed;
			inset: 0;
			width: 100vw;
			height: 100vh;
			object-fit: cover;
			z-index: 0;
			display: none;
		}
		.zalo-overlay {
			position: fixed;
			inset: 0;
			background: none;
			z-index: 1;
		}
		.zalo-content {
			position: relative;
			z-index: 2;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
		}
		.zalo-qr {
			max-width: 420px;
			width: 90vw;
			border-radius: 24px;
			box-shadow: 0 20px 60px rgba(0,0,0,0.3);
			margin-bottom: 32px;
			animation: slideUp 0.6s ease;
		}
		.zalo-title {
			color: #fff;
			font-size: 2.2rem;
			font-weight: 700;
			text-shadow: 0 3px 12px rgba(0,0,0,0.25);
			margin-bottom: 24px;
			letter-spacing: 1px;
			animation: fadeInDown 0.6s ease;
		}
		.zalo-desc {
			color: #fff;
			font-size: 1.1rem;
			text-align: center;
			text-shadow: 0 2px 8px rgba(0,0,0,0.15);
			animation: fadeInUp 0.6s ease 0.2s both;
		}

		@keyframes slideUp {
			from {
				opacity: 0;
				transform: translateY(40px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeInDown {
			from {
				opacity: 0;
				transform: translateY(-30px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@keyframes fadeInUp {
			from {
				opacity: 0;
				transform: translateY(20px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		@media (max-width: 600px) {
			.zalo-qr { max-width: 95vw; }
			.zalo-title { font-size: 1.6rem; }
		}
	</style>
</head>
<body>
	<img src="../images/anhnen.jpg" alt="Zalo Background" class="zalo-bg">
	<div class="zalo-overlay"></div>
	<div class="zalo-content">
		<div class="zalo-title">Kết nối Zalo với Horse Store</div>
		<img src="../images/qrzalovy.jpg" alt="QR Zalo Horse Store" class="zalo-qr">
		<div class="zalo-desc">Quét mã QR hoặc nhấn vào ảnh để kết bạn Zalo với Horse Store và nhận tư vấn nhanh chóng!</div>
	</div>
	
	<script src="../js/contact-widget.js"></script>
</body>
</html>
