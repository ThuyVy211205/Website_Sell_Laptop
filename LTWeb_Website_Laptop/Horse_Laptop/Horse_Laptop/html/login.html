<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Tech World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" aria-labelledby="loginTitle">
      <a class="auth-brand" href="index.html">Tech World</a>
      <h1 id="loginTitle">Đăng nhập</h1>
      <p class="auth-subtitle">Chào mừng bạn quay lại với Tech World</p>

      <div id="authMessage" class="auth-message hidden" role="alert"></div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" name="email" type="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="loginPassword">Mật khẩu</label>
          <input id="loginPassword" name="password" type="password" placeholder="Nhập mật khẩu" required>
        </div>

        <button class="auth-btn" type="submit">Đăng nhập</button>
      </form>

      <p class="auth-switch">
        Chưa có tài khoản?
        <a href="register.html">Đăng ký ngay</a>
      </p>

      <button type="button" id="logoutBtn" class="logout-btn hidden">Logout</button>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/contact-widget.js"></script>
</body>
</html>
