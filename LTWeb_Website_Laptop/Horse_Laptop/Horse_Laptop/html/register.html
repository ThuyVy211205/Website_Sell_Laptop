<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký -Tech World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <main class="auth-page">
    <section class="auth-card" aria-labelledby="registerTitle">
      <a class="auth-brand" href="index.html">Tech World</a>
      <h1 id="registerTitle">Đăng ký tài khoản</h1>
      <p class="auth-subtitle">Tạo tài khoản để mua sắm nhanh hơn</p>

      <div id="authMessage" class="auth-message hidden" role="alert"></div>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label for="fullName">Họ và tên</label>
          <input id="fullName" name="fullName" type="text" placeholder="Phan Thúy Vy" required>
        </div>

        <div class="form-group">
          <label for="registerEmail">Email</label>
          <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="registerPassword">Mật khẩu</label>
          <input id="registerPassword" name="password" type="password" placeholder="Ít nhất 6 ký tự" required>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Xác nhận mật khẩu</label>
          <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Nhập lại mật khẩu" required>
        </div>

        <button class="auth-btn" type="submit">Đăng ký</button>
      </form>

      <p class="auth-switch">
        Đã có tài khoản?
        <a href="login.html">Đăng nhập</a>
      </p>

      <button type="button" id="logoutBtn" class="logout-btn hidden">Logout</button>
    </section>
  </main>

  <script src="../js/auth.js"></script>
  <script src="../js/contact-widget.js"></script>
</body>
</html>
